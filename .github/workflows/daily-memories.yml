name: Daily memory notifications

# Runs every 30 minutes. The endpoint sends once per day, on the first run at
# or after the admin-chosen send hour (in the configured timezone) — so an
# editable send time works without changing this schedule, and a run that
# GitHub skips (scheduled runs are best-effort) self-heals on the next one.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily notification
        run: |
          curl -sS -X POST "${SITE_URL}/api/notifications/daily" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
